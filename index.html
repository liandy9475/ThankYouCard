<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Thank You Card</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>

  <div id="sidebar">
    <h2>Audio Control</h2>
    <div class="control-group">
      <input type="file" id="audioUpload" accept="audio/*">
    </div>
    <div class="control-group">
      <button id="playBtn" class="action-btn" disabled>Play</button>
    </div>

    <h2>Export</h2>
    <div class="control-group">
      <button id="recordBtn" class="action-btn">Export</button>
    </div>

    <h2>Kinetic Controls</h2>
    <div class="control-group">
      <label>Text Input</label>
      <input type="text" id="textStr" value="Thank You">
    </div>
    <div class="control-group">
      <label>Text Style</label>
      <select id="textMode">
        <option value="outline">Thin Line (Outline)</option>
        <option value="solid">Solid Block</option>
      </select>
    </div>
    <div class="control-group">
      <label>Background Color</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>
    <div class="control-group">
      <label>Core Color</label>
      <input type="color" id="colorCore" value="#FF0000"> 
    </div>
    <div class="control-group">
      <label>Mid Color</label>
      <input type="color" id="colorMid" value="#E03EBD">
    </div>
    <div class="control-group">
      <label>Dark Color</label>
      <input type="color" id="colorDark" value="#D1D1D1">
    </div>
    <div class="control-group">
      <label><span>Melt Amount</span> <span id="meltAmountVal">12</span></label>
      <input type="range" id="meltAmount" min="1" max="40" step="0.5" value="12">
    </div>
    <div class="control-group">
      <label><span>Outline Thickness</span> <span id="outlineThicknessVal">0.9</span></label>
      <input type="range" id="outlineThickness" min="0" max="1" step="0.05" value="0.9">
    </div>

    <h2>Camera & View</h2>
    <div class="control-group">
      <label><span>Composition Zoom</span> <span id="zoomVal">4.6</span></label>
      <input type="range" id="zoom" min="0.5" max="5.0" step="0.1" value="4.6">
    </div>
    <div class="control-group">
      <label><span>Lens Strength</span> <span id="lensStrengthVal">-0.6</span></label>
      <input type="range" id="lensStrength" min="-1.5" max="1.5" step="0.05" value="-0.6">
    </div>

    <h2>Typography Axes</h2>
    <div class="control-group">
      <label><span>Base Weight</span> <span id="vfWghtVal">1000</span></label>
      <input type="range" id="vfWght" min="100" max="1000" value="1000">
    </div>
    <div class="control-group">
      <label><span>Base Width</span> <span id="vfWdthVal">151</span></label>
      <input type="range" id="vfWdth" min="25" max="151" value="151">
    </div>

    <h2>Grid Constraints</h2>
    <div class="control-group">
      <label><span>Columns</span> <span id="colsVal">9</span></label>
      <input type="range" id="cols" min="5" max="80" value="9">
    </div>
    <div class="control-group">
      <label><span>Rows</span> <span id="rowsVal">13</span></label>
      <input type="range" id="rows" min="5" max="80" value="13">
    </div>
    <div class="control-group">
      <label><span>Animation Speed</span> <span id="animSpeedVal">0.1</span></label>
      <input type="range" id="animSpeed" min="0" max="0.1" step="0.001" value=".1">
    </div>
    <div class="control-group">
      <label><span>Wave X Freq</span> <span id="freqXVal">0.09</span></label>
      <input type="range" id="freqX" min="0" max="1" step="0.01" value="0.09">
    </div>
    <div class="control-group">
      <label><span>Wave Y Freq</span> <span id="freqYVal">0.89</span></label>
      <input type="range" id="freqY" min="0" max="1" step="0.01" value="0.89">
    </div>
  </div>

  <div id="canvas-container"></div>
  
  <script src="recorder.js"></script>
  <script src="sketch.js"></script>

</body>
</html>
